<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopkeeper Login - Campus Print</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-printer"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
      <a href="index.html">Campus Print</a>
    </div>
  </header>

  <main class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div class="auth-container glass-card" id="loginCard">
      <div style="text-align: center; margin-bottom: 2rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--secondary); margin-bottom: 1rem;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        <h2>Shopkeeper Login</h2>
        <p class="subtitle" style="margin-bottom: 0;">Authorized personnel only</p>
      </div>
      
      <div id="alertBox" class="alert hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" required placeholder="Enter Supabase admin email">
        </div>
        <div class="form-group">
          <label for="password">Admin Password</label>
          <input type="password" id="password" required placeholder="Enter password to access dashboard">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Secure Login</button>
      </form>
    </div>
  </main>

  <style>
    .hidden { display: none; }
  </style>

  <script type="module" src="shop-login.js"></script>
</body>
</html>
