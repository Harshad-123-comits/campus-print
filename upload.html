<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Document</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="shopTitle">Printing</h2>

  <form onsubmit="submitForm(event)">
    <input type="file" required>
    <input type="number" id="copies" value="1" min="1">
    
    <select id="type">
      <option>Black & White</option>
      <option>Color</option>
    </select>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const shopName = params.get("shop");

document.getElementById("shopTitle").innerText =
  "Printing at " + shopName;

function submitForm(e){
  e.preventDefault();

  const fileInput = document.querySelector("input[type='file']");
  const file = fileInput.files[0];

  const copies = document.getElementById("copies").value;
  const type = document.getElementById("type").value;

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.push({
    shop: shopName,
    fileName: file ? file.name : "No file",   //  store file name
    copies: copies,
    type: type,
    status: "Pending",
    time: new Date().toLocaleString()
  });

  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Order Submitted!");

  // Optional: reset form
  e.target.reset();
}
</script>

</body>
</html>
