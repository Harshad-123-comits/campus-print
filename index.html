<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Print - Home</title>
  <meta name="description" content="Campus print service. Submit jobs easily.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Animated Background Blobs -->
  <div class="bg-blobs">
    <div class="blob-1"></div>
    <div class="blob-2"></div>
  </div>

  <header class="animate-slide-up">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9"></polyline>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
        <rect x="6" y="14" width="12" height="8"></rect>
      </svg>
      <a href="index.html">Campus Print</a>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="choose-shop.html" class="nav-link">Choose Shop</a>
      <a href="shop-login.html" class="nav-link">Admin Login</a>
    </nav>
  </header>

  <main class="container">
    <div class="hero-grid">

      <!-- Text & Actions CTA -->
      <div class="hero-content animate-slide-up delay-1">
        <h1>Printing, <br> <span class="text-gradient">reimagined.</span></h1>
        <p class="subtitle">Experience the fastest, most reliable, and beautifully paperless campus printing service.
          Just drop, click, and collect.</p>

        <div class="features-grid">
          <a href="choose-shop.html" class="glass-panel feature-card">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"></polyline>
              <line x1="12" y1="12" x2="12" y2="21"></line>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
              <polyline points="16 16 12 12 8 16"></polyline>
            </svg>
            <div>
              <h3>I am a Customer</h3>
              <p style="font-size:0.875rem; color:var(--text-muted-dark); margin-top:0.5rem;">Upload documents</p>
            </div>
          </a>

          <a href="shop-login.html" class="glass-panel feature-card">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <div>
              <h3>Shopkeeper</h3>
              <p style="font-size:0.875rem; color:var(--text-muted-dark); margin-top:0.5rem;">Manage orders</p>
            </div>
          </a>
        </div>
      </div>

      <!-- High Quality AI Hero Image -->
      <div class="hero-visual animate-slide-up delay-2">
        <img
          src="https://tse4.mm.bing.net/th/id/OIP.DnB2mNuWQ02GxOJCZf2oiAHaEK?w=333&h=187&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
          alt="Campus Print Abstract Illustration" class="hero-image">
      </div>

    </div>
  </main>

  <footer class="modern-footer animate-slide-up delay-3">
    <p>&copy; 2026 Campus Print. All rights reserved.</p>
  </footer>
</body>

</html>
