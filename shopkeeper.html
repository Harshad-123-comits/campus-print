<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Dashboard - Campus Print</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-layout">
  
  <aside class="sidebar animate-slide-up">
    <div class="brand" style="margin-bottom: 2rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      <span>Shop Admin</span>
    </div>

    <div style="flex-grow: 1;">
      <p style="font-size: 0.875rem; color: var(--text-muted-dark); text-transform: uppercase; font-weight: 700; margin-bottom: 1rem;">Navigation</p>
      <a href="index.html" style="display: flex; align-items: center; gap: 0.75rem; color: var(--text-light); text-decoration: none; padding: 0.75rem 1rem; border-radius: var(--radius-sm); background: rgba(255,255,255,0.05); margin-bottom: 0.5rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Home
      </a>
      <a href="#" style="display: flex; align-items: center; gap: 0.75rem; color: white; text-decoration: none; padding: 0.75rem 1rem; border-radius: var(--radius-sm); background: var(--primary); font-weight: 600;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        Queue
      </a>
    </div>

    <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--glass-border-dark);">
      <div id="managedShops" class="managed-shops-list"></div>
      <div id="authStatus" style="color: var(--success); font-size: 0.875rem; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
        <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);"></div> Checking login...
      </div>
      <button id="logoutBtn" class="btn btn-secondary" style="width: 100%; border: 1px solid rgba(255,255,255,0.2);">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="animate-slide-up delay-1">
      <div class="dashboard-heading">
        <div>
          <p class="eyebrow">Shopkeeper Queue</p>
          <h2 style="margin-bottom: 0.75rem; color: var(--text-dark);">Operations Dashboard</h2>
          <p id="dashboardScope" class="dashboard-scope">Loading your assigned shop...</p>
        </div>
      </div>
      
      <!-- Dashboard Stats Widget -->
      <div class="stats-grid">
        <div class="glass-panel stat-card" style="background: white;">
          <div class="stat-value" id="statPending">0</div>
          <div class="stat-label">Pending Jobs</div>
        </div>
        <div class="glass-panel stat-card" style="background: white;">
          <div class="stat-value text-gradient" id="statPrinted">0</div>
          <div class="stat-label">Completed Jobs</div>
        </div>
        <div class="glass-panel stat-card" style="background: white;">
          <div class="stat-value" id="statTotalItems" style="color: var(--text-dark);">0</div>
          <div class="stat-label">Total Copies</div>
        </div>
      </div>

      <!-- Data Table -->
      <div class="table-wrapper glass-panel animate-slide-up delay-2" style="background: white;">
        <table id="jobsTable">
          <thead>
            <tr>
              <th>Shop</th>
              <th>Document Name</th>
              <th>Copies</th>
              <th>Type</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Time</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="jobsTableBody">
            <tr>
              <td colspan="8" style="text-align: center; padding: 3rem; color: var(--text-muted-dark); font-weight: 500;">
                <div class="spinner" style="border-top-color: var(--primary); margin-bottom: 1rem;"></div>
                <div>Connecting to Database...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module" src="shopkeeper.js"></script>
</body>
</html>
