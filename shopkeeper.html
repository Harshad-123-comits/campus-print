<!DOCTYPE html>
<html>
<head>
<title>Shop Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  padding: 20px;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}

th {
  background: black;
  color: white;
}
</style>
</head>

<body>

<h2>Print Queue</h2>

<table>
<tr>
  <th>Copies</th>
  <th>Type</th>
  <th>Status</th>
</tr>

<tbody id="orders"></tbody>

</table>

<script>
// Example: change this for each shop login
let shopName = "Shop101";  

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let html = "";

orders.forEach((order, index) => {
  if(order.shop === shopName){   // ✅ filter by shop
    html += `
      <tr>
        <td>${order.copies}</td>
        <td>${order.type}</td>
        <td>${order.status}</td>
      </tr>
    `;
  }
});

document.getElementById("orders").innerHTML = html;
</script>

</body>
</html>
