<!DOCTYPE html>
<html>
<head>
<title>Shop Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  padding: 20px;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}

th {
  background: black;
  color: white;
}
</style>
</head>

<body>

<h2>Print Queue</h2>

<table>
<tr>
  <th>Copies</th>
  <th>Type</th>
  <th>Status</th>
</tr>

<tbody id="orders"></tbody>

</table>

<script>
const order = JSON.parse(localStorage.getItem("order"));

if(order){
  document.getElementById("orders").innerHTML = `
    <tr>
      <td>${order.copies}</td>
      <td>${order.type}</td>
      <td>Pending</td>
    </tr>
  `;
}
</script>

</body>
</html>
